name: CI

on:
  push:
    branches: [master, main, "claude/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: PHP ${{ matrix.php }} / deps=${{ matrix.deps }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]
        deps: ["highest"]
        include:
          - php: "8.2"
            deps: "lowest"
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov
          extensions: simplexml, dom, mbstring, intl
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v4
        with:
          dependency-versions: ${{ matrix.deps }}

      - name: Run PHPUnit (with coverage on PHP 8.3 / highest)
        if: matrix.php == '8.3' && matrix.deps == 'highest'
        run: vendor/bin/phpunit --coverage-clover coverage.xml

      - name: Run PHPUnit
        if: matrix.php != '8.3' || matrix.deps != 'highest'
        run: vendor/bin/phpunit

      - name: Upload coverage to Codecov
        if: matrix.php == '8.3' && matrix.deps == 'highest'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2
      - uses: ramsey/composer-install@v4
      - run: vendor/bin/phpstan analyse --no-progress

  psalm:
    name: Psalm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2
      - uses: ramsey/composer-install@v4
      - run: vendor/bin/psalm --no-progress --output-format=github

  cs:
    name: php-cs-fixer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2, cs2pr
      - uses: ramsey/composer-install@v4
      - run: vendor/bin/php-cs-fixer fix --dry-run --diff --format=checkstyle | cs2pr
