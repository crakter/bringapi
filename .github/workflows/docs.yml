name: Docs

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - "src/**"
      - "phpdoc.dist.xml"
      - "README.md"
      - "UPGRADE-4.0.md"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "src/**"
      - "phpdoc.dist.xml"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # phpDocumentor publishes an official Docker image; using the action
      # avoids pulling its (heavy and conflict-prone) composer tree.
      - name: Build API docs
        uses: phpDocumentor/phpDocumentor@v3
        with:
          target: docs/build
          config: phpdoc.dist.xml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: docs/build
          if-no-files-found: error
          retention-days: 30

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    # Auto-deploy to GitHub Pages on master/main. Enable Pages with
    # "GitHub Actions" as the source in repo settings to make this effective.
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
