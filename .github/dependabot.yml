version: 2
updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Oslo
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      dev-tooling:
        patterns:
          - "phpunit/*"
          - "friendsofphp/php-cs-fixer"
          - "phpstan/*"
          - "vimeo/psalm"
          - "rector/*"
          - "phpoffice/phpspreadsheet"
      runtime:
        patterns:
          - "guzzlehttp/*"
          - "psr/*"
          - "http-interop/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
